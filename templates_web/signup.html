<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — Nexus Mail</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
<div class="auth-shell">
  <div class="auth-card" style="max-width:460px;">

    <div class="auth-brand">
      <div class="auth-logo">✉</div>
      <span class="auth-logo-text">Nexus Mail</span>
    </div>

    <h1 class="auth-title">Create your account</h1>
    <p class="auth-subtitle">Start automating your email campaigns in minutes. Free forever.</p>

    <div class="auth-panel">
      {% if error %}
      <div class="alert alert-error">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span>{{ error }}</span>
      </div>
      {% endif %}

      <form method="post" action="/signup" id="signup-form">
        <div class="form-group">
          <label class="form-label" for="name">Full name</label>
          <input class="form-control" type="text" id="name" name="name"
            placeholder="Muhammad Ali" required autocomplete="name" />
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <input class="form-control" type="email" id="email" name="email"
            placeholder="you@example.com" required autocomplete="email" />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-group">
            <input class="form-control" type="password" id="password" name="password"
              placeholder="Create a strong password" required autocomplete="new-password"
              oninput="updateStrength(this.value)" />
            <span class="input-icon" id="toggle-pw">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </span>
          </div>
          <!-- Strength bar -->
          <div class="strength-bar" id="strength-bar">
            <div class="strength-segment" id="seg1"></div>
            <div class="strength-segment" id="seg2"></div>
            <div class="strength-segment" id="seg3"></div>
            <div class="strength-segment" id="seg4"></div>
            <div class="strength-segment" id="seg5"></div>
          </div>
          <div class="strength-label" id="strength-label">Enter a password</div>
          <div class="form-hint" style="margin-top:0.5rem;">
            Must contain uppercase, lowercase, number &amp; special character (!@#$%…)
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirm_password">Confirm password</label>
          <input class="form-control" type="password" id="confirm_password" name="confirm_password"
            placeholder="Repeat your password" required autocomplete="new-password" />
        </div>

        <button type="submit" class="btn btn-gradient btn-full btn-lg" id="submit-btn">
          <span id="submit-label">Create account</span>
          <span id="submit-spinner" class="spinner" style="display:none;"></span>
        </button>
      </form>
    </div>

    <div class="auth-footer">
      Already have an account? <a href="/login">Sign in</a>
    </div>

  </div>
</div>

<script>
  // Password show/hide
  document.getElementById('toggle-pw').addEventListener('click', () => {
    const f = document.getElementById('password');
    f.type = f.type === 'text' ? 'password' : 'text';
  });

  // Strength meter
  function updateStrength(pw) {
    let score = 0;
    if (pw.length >= 8)  score++;
    if (/[A-Z]/.test(pw)) score++;
    if (/[a-z]/.test(pw)) score++;
    if (/\d/.test(pw))    score++;
    if (/[!@#$%^&*()\-_=+\[\]{}|;:',.<>?`~\\]/.test(pw)) score++;

    const labels = ['', 'Very Weak', 'Weak', 'Fair', 'Strong', 'Very Strong'];
    document.getElementById('strength-label').textContent = pw ? labels[score] : 'Enter a password';

    for (let i = 1; i <= 5; i++) {
      const seg = document.getElementById('seg' + i);
      seg.className = 'strength-segment';
      if (i <= score) seg.classList.add('filled-' + score);
    }
  }

  // Spinner on submit
  document.getElementById('signup-form').addEventListener('submit', () => {
    document.getElementById('submit-label').style.display = 'none';
    document.getElementById('submit-spinner').style.display = 'inline-block';
    document.getElementById('submit-btn').disabled = true;
  });
</script>
</body>
</html>
